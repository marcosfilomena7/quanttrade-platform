name: CI

"on":
  push:
  pull_request:

# A new push to the same branch/PR cancels any CI run already in progress
# for it — fail fast in the "don't waste time on a superseded commit" sense.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, typecheck, test, ADR immutability
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history, not the default shallow clone: the ADR
          # immutability check (below) diffs against an arbitrary prior
          # commit, which a depth-1 checkout would not have available.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install project + dev toolchain
        run: make install

      - name: Lint (ruff + import-linter layering check)
        run: make lint

      - name: Typecheck (mypy --strict on domain/ and application/)
        run: make typecheck

      - name: Test (pytest, unit only — no Docker in Phase 0)
        run: make test

      - name: ADR immutability check (docs/adr/ is append-only — T-P0-12)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi
          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "No prior commit to diff against (first push on this ref) — skipping."
          else
            make adr-check BASE_REF="$BASE_SHA" HEAD_REF="${{ github.sha }}"
          fi
